<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung: Metal Sahur</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 30px); }
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; touch-action: none; -webkit-user-select: none; font-family: 'Courier New', Courier, monospace; color: #fff; }
        
        canvas { display: block; image-rendering: pixelated; }

        #hud { position: absolute; top: 40px; width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; text-shadow: 3px 3px 0 #000; z-index: 10; pointer-events: none; }
        #mission { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: #ffcc00; display: none; z-index: 1000; text-shadow: 5px 5px 0 #000; }

        /* iPAD CONTROLS: Metal Slug Arcade Style */
        .controls { position: absolute; bottom: calc(var(--safe-bottom) + 100px); width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 100; }
        .dir-pad { display: flex; gap: 20px; }
        .btn { width: 100px; height: 100px; border: 6px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #333; box-shadow: 6px 6px 0 #000; }
        #jumpBtn { border-color: #00ff00; background: rgba(0, 255, 0, 0.2); }
        #shootBtn { border-color: #ff0000; background: rgba(255, 0, 0, 0.2); width: 120px; height: 120px; }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>

    <div id="hud">
        <div>AMMO: <span id="ammo">∞</span></div>
        <div>SCORE: <span id="score">0</span></div>
    </div>
    <div id="mission">MISSION START!</div>

    <div class="controls">
        <div class="dir-pad">
            <div class="btn" id="lBtn">LEFT</div>
            <div class="btn" id="rBtn">RIGHT</div>
        </div>
        <div class="btn" id="jumpBtn">JUMP</div>
        <div class="btn" id="shootBtn">FIRE!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const charImg = new Image();
    charImg.src = 'image.png';

    let w, h, groundY, score = 0, frame = 0, active = true;
    let enemies = [], bullets = [], particles = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.8;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        x: 100, y: 0, dy: 0, dx: 0, w: 120, h: 120, jumping: false, facing: 1,
        update() {
            this.dy += 1.2; // Gravity
            this.y += this.dy;
            this.x += this.dx;

            if (this.y > groundY - 110) {
                this.y = groundY - 110;
                this.dy = 0;
                this.jumping = false;
            }
            // Screen boundaries
            if (this.x < 0) this.x = 0;
            if (this.x > w - this.w) this.x = w - this.w;
        },
        draw() {
            ctx.save();
            if (this.facing === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(charImg, -this.x - this.w, this.y, this.w, this.h);
            } else {
                ctx.drawImage(charImg, this.x, this.y, this.w, this.h);
            }
            ctx.restore();
        }
    };

    function shoot() {
        bullets.push({ x: player.x + (player.facing === 1 ? 100 : 0), y: player.y + 60, vx: player.facing * 15 });
    }

    function spawnEnemy() {
        if (frame % 90 === 0) {
            enemies.push({ x: w, y: groundY - 80, w: 60, h: 80, hp: 2 });
        }
    }

    function loop() {
        if (!active) return;
        frame++;
        ctx.clearRect(0, 0, w, h);

        // BG: Gritty Pixel City
        ctx.fillStyle = '#222'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#444'; ctx.fillRect(0, groundY, w, h-groundY);
        ctx.fillStyle = '#fff'; // Distant stars
        for(let i=0; i<10; i++) ctx.fillRect((i*200 - frame)%w, 50 + (i*20), 4, 4);

        player.update();
        player.draw();
        spawnEnemy();

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx;
            ctx.fillStyle = '#ffff00'; ctx.fillRect(b.x, b.y, 20, 6);
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        });

        // Enemies
        enemies.forEach((en, i) => {
            en.x -= 4;
            // Enemy Body
            ctx.fillStyle = '#5d6d7e'; ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(en.x + 10, en.y + 10, 10, 10); // Evil Eye

            // Bullet vs Enemy
            bullets.forEach((b, bi) => {
                if (b.x < en.x + en.w && b.x + 20 > en.x && b.y < en.y + en.h && b.y + 6 > en.y) {
                    en.hp--;
                    bullets.splice(bi, 1);
                    if (en.hp <= 0) {
                        enemies.splice(i, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            // Player vs Enemy
            if (player.x + 80 > en.x && player.x < en.x + en.w && player.y + 80 > en.y && player.y < en.y + en.h) {
                location.reload(); // Game Over
            }
        });

        requestAnimationFrame(loop);
    }

    // iPad ARCADE CONTROLS
    const btn = (id, start, end) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); if(end) end(); });
    };

    btn('lBtn', () => { player.dx = -7; player.facing = -1; }, () => { player.dx = 0; });
    btn('rBtn', () => { player.dx = 7; player.facing = 1; }, () => { player.dx = 0; });
    btn('jumpBtn', () => { if(!player.jumping){ player.dy = -26; player.jumping=true; } });
    btn('shootBtn', () => shoot());

    // Splash Screen
    const ms = document.getElementById('mission');
    ms.style.display = 'block';
    setTimeout(() => { ms.style.display = 'none'; loop(); }, 1500);

</script>
</body>
</html>
