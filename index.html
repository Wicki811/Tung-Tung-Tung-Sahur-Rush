<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung Obby HD</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 40px); }
        body { margin: 0; overflow: hidden; background: #4facfe; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* UI HUD */
        #hud {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: white; font-size: 32px; font-weight: 900; text-shadow: 3px 3px 0 #000;
            pointer-events: none;
        }

        /* iPad Button Fix: Pushed high and large */
        .controls {
            position: absolute; bottom: calc(var(--safe-bottom) + 100px);
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 60px; box-sizing: border-box;
        }
        .dir-pad { display: flex; gap: 20px; }
        .btn {
            width: 100px; height: 100px; border-radius: 20px; border: 4px solid #fff;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 18px; box-shadow: 0 8px 0 #000;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        #jumpBtn { background: #ff0066; width: 140px; height: 140px; border-radius: 50%; }
        .btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #000; }
        
        #wicki { position: absolute; top: 10px; right: 20px; color: #fff; opacity: 0.6; }
    </style>
</head>
<body>

<div id="hud">SCORE: <span id="score">0</span></div>
<div id="wicki">by wicki</div>

<canvas id="game"></canvas>

<div class="controls">
    <div class="dir-pad">
        <div class="btn" id="lBtn">LEFT</div>
        <div class="btn" id="rBtn">RIGHT</div>
    </div>
    <div class="btn" id="jumpBtn">JUMP</div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w, h, frame = 0, score = 0;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        x: 0, y: 0, z: 0, dy: 0, tx: 0,
        update() {
            this.dy -= 0.6; // Gravity
            this.y += this.dy;
            if (this.y < 0) { this.y = 0; this.dy = 0; }
            this.x += (this.tx - this.x) * 0.15;
            this.z += 0.15; // Forward movement
            score = Math.floor(this.z * 10);
            document.getElementById('score').innerText = score;
        }
    };

    const platforms = [];
    for(let i=0; i<15; i++) {
        platforms.push({ x: (Math.random()-0.5)*10, z: i*8, color: i%2===0?'#33ff33':'#ff0066' });
    }

    function draw() {
        ctx.fillStyle = '#4facfe'; // Sky
        ctx.fillRect(0,0,w,h);

        // Draw Platforms
        platforms.sort((a,b) => b.z - a.z); // Depth sorting
        platforms.forEach(p => {
            let relZ = p.z - player.z;
            if(relZ < -10) { p.z += 120; p.x = (Math.random()-0.5)*12; }

            if(relZ > 0) {
                let scale = 400 / relZ;
                let sx = w/2 + (p.x - player.x) * scale;
                let sy = h/2 + (5 - player.y) * scale;
                let sw = 4 * scale;
                let sh = 0.5 * scale;

                ctx.fillStyle = p.color;
                ctx.fillRect(sx - sw/2, sy, sw, sh);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
                ctx.strokeRect(sx - sw/2, sy, sw, sh);
            }
        });

        // Draw Tung Tung (Character)
        let charScale = 30; 
        let cx = w/2;
        let cy = h/2 + 100 - (player.y * 3);

        ctx.save();
        ctx.translate(cx, cy);
        // Log Body
        ctx.fillStyle = '#d2b48c';
        ctx.fillRect(-25, -80, 50, 100);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        ctx.strokeRect(-25, -80, 50, 100);
        // Eyes
        ctx.fillStyle = 'white';
        ctx.fillRect(-15, -65, 12, 12); ctx.fillRect(5, -65, 12, 12);
        ctx.fillStyle = 'black';
        ctx.fillRect(-11, -61, 4, 4); ctx.fillRect(9, -61, 4, 4);
        // Mouth
        ctx.fillRect(-10, -35, 20, 6);
        ctx.restore();
    }

    // iPad Controls
    const btn = (id, fn) => document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
    btn('lBtn', () => player.tx -= 2);
    btn('rBtn', () => player.tx += 2);
    btn('jumpBtn', () => { if(player.y === 0) player.dy = 14; });

    function loop() {
        draw();
        player.update();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
