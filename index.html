<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Store Defense: Grand Opening</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; padding: 0; overflow: hidden; background: #b71c1c; touch-action: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; image-rendering: auto; }
        
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.1rem; z-index: 10; pointer-events: none; color: #fff; text-shadow: 2px 2px #000; font-weight: bold; }
        #wave-ui { position: absolute; top: 60px; width: 100%; text-align: center; font-size: 1.4rem; color: #ffeb3b; font-weight: bold; text-shadow: 2px 2px #000; }
        
        #shop-menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .shop-section { width: 90%; max-width: 400px; margin-bottom: 15px; border: 2px solid #fff; padding: 15px; background: #333; border-radius: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .shop-item button { background: #4caf50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #shop-btn { position: absolute; top: 15px; right: 15px; background: #fff; color: #b71c1c; padding: 10px 20px; border-radius: 5px; z-index: 20; border: none; font-weight: bold; }
        .controls { position: absolute; bottom: calc(var(--safe-bottom) + 20px); width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #shootBtn { width: 90px; height: 90px; background: rgba(255,255,255,0.4); border: 3px solid #ffeb3b; }
    </style>
</head>
<body>

    <div id="hud">
        <div>SALES: $<span id="score">0</span></div>
        <div>LV: <span id="player-lv">1</span></div>
        <div>HP: <span id="hp">100</span></div>
    </div>

    <div id="wave-ui">WAVE <span id="wave-num">1</span></div>

    <button id="shop-btn" onclick="toggleShop()">UPGRADES</button>

    <div id="shop-menu">
        <h1>STORE UPGRADES</h1>
        <div class="shop-section">
            <div class="shop-item"><span>PROMOTION (LV UP)</span><button onclick="levelUp()" id="lvlBtn">$1000</button></div>
            <div class="shop-item"><span>CHICKEN BLASTER</span><button onclick="buyWeapon(1)" id="w1">$1500</button></div>
            <div class="shop-item"><span>GRAVY CANNON</span><button onclick="buyWeapon(2)" id="w2">$5000</button></div>
        </div>
        <div class="shop-section">
            <div class="shop-item"><span>FRENCH FRIES (HEAL)</span><button onclick="buyHeal()">$400</button></div>
        </div>
        <button onclick="toggleShop()" style="margin-top: 20px; padding: 15px 40px;">RESUME DEFENSE</button>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 10px;">
            <div class="btn" id="lBtn">LEFT</div>
            <div class="btn" id="jumpBtn">JUMP</div>
            <div class="btn" id="rBtn">RIGHT</div>
        </div>
        <div class="btn" id="shootBtn">FIRE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, groundY, score = 0, hp = 100, frame = 0, paused = false;
    let enemies = [], bullets = [], wave = 1, enemiesToSpawn = 8;
    let px = 100, py = 0, dy = 0, dx = 0, facing = 1, isJumping = false;
    let pLevel = 1, pSpeed = 8, pLvlCost = 1000, activeWep = 0;

    const weapons = [
        { name: 'Basic', dmg: 10, speed: 15, size: 8, color: '#fff' },
        { name: 'Blaster', dmg: 18, speed: 20, size: 10, color: '#ffeb3b' },
        { name: 'Cannon', dmg: 50, speed: 12, size: 25, color: '#795548' }
    ];
    let ownedWeapons = [true, false, false];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.85;
    }
    window.addEventListener('resize', resize);
    resize();

    function toggleShop() { paused = !paused; document.getElementById('shop-menu').style.display = paused ? 'flex' : 'none'; }
    
    function levelUp() {
        if (score >= pLvlCost) {
            score -= pLvlCost; pLevel++; pSpeed += 1; pLvlCost *= 2;
            document.getElementById('player-lv').innerText = pLevel;
            document.getElementById('lvlBtn').innerText = "$" + pLvlCost;
        }
    }

    function buyWeapon(idx) {
        const prices = [0, 1500, 5000];
        if (score >= prices[idx] && !ownedWeapons[idx]) {
            score -= prices[idx]; ownedWeapons[idx] = true;
            activeWep = idx;
        } else if (ownedWeapons[idx]) activeWep = idx;
    }

    function buyHeal() { if (score >= 400) { score -= 400; hp = 100; } }

    function update() {
        if (paused) return;
        frame++;

        // Physics
        dy += 1.2; py += dy; px += dx;
        if (py > groundY - 70) { py = groundY - 70; dy = 0; isJumping = false; }
        px = Math.max(0, Math.min(w - 50, px));

        // Spawning
        if (enemiesToSpawn > 0 && frame % 100 === 0) {
            enemies.push({ x: w, y: groundY - 80, w: 50, h: 80, hp: 30 + wave * 10, speed: 2 + Math.random() * 2 });
            enemiesToSpawn--;
        }

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.v;
            enemies.forEach((en, j) => {
                if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                    en.hp -= b.dmg;
                    bullets.splice(i, 1);
                    if (en.hp <= 0) { enemies.splice(j, 1); score += 200; }
                }
            });
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        });

        // Enemies
        enemies.forEach((en, i) => {
            en.x -= en.speed;
            if (en.x < px + 40 && en.x + en.w > px && py + 70 > en.y) {
                hp -= 0.5;
            }
            if (en.x < -50) { enemies.splice(i, 1); hp -= 10; }
        });

        // Wave reset
        if (enemiesToSpawn === 0 && enemies.length === 0) {
            wave++;
            enemiesToSpawn = 8 + wave * 2;
            document.getElementById('wave-num').innerText = wave;
        }

        if (hp <= 0) location.reload();
        document.getElementById('score').innerText = score;
        document.getElementById('hp').innerText = Math.floor(hp);
    }

    function draw() {
        ctx.clearRect(0,0,w,h);
        
        // Floor
        ctx.fillStyle = '#424242';
        ctx.fillRect(0, groundY, w, h - groundY);

        // Player (Store Worker)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px, py, 40, 70); // Shirt
        ctx.fillStyle = '#d32f2f';
        ctx.fillRect(px, py, 40, 10); // Red Cap
        ctx.fillStyle = '#000';
        ctx.fillRect(px + (facing === 1 ? 30 : 0), py + 30, 20, 10); // Spatula/Weapon

        // Enemies (Crowd)
        enemies.forEach(en => {
            ctx.fillStyle = '#1565c0';
            ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = '#ff0000'; // Health bar
            ctx.fillRect(en.x, en.y - 10, en.w * (en.hp/(30 + wave * 10)), 5);
        });

        // Bullets
        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    // Input
    const ctrl = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    ctrl('lBtn', () => { dx = -pSpeed; facing = -1; }, () => dx = 0);
    ctrl('rBtn', () => { dx = pSpeed; facing = 1; }, () => dx = 0);
    ctrl('jumpBtn', () => { if(!isJumping) { dy = -22; isJumping = true; } });
    ctrl('shootBtn', () => {
        const wp = weapons[activeWep];
        bullets.push({ x: px + 20, y: py + 35, v: facing * wp.speed, dmg: wp.dmg, size: wp.size, color: wp.color });
    });

    loop();
</script>
</body>
</html>
