<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung Crossy Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87af3a; touch-action: none; -webkit-user-select: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 40px; color: white; pointer-events: none; text-shadow: 3px 3px 0 #000;
        }
        .score-text { font-size: 60px; margin: 0; }
        .msg-text { font-size: 20px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 20px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="scoreLabel" class="score-text">0</h1>
        <div id="msgLabel" class="msg-text">TAP TO HOP!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreLabel = document.getElementById('scoreLabel');
    const msgLabel = document.getElementById('msgLabel');

    let w, h, state = 'PLAYING', score = 0, frame = 0;
    const tileSize = 55;
    let rows = [];
    const rowTypes = ['GRASS', 'ROAD', 'ROAD', 'GRASS', 'ROAD'];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Isometric Projection Logic
    function toScreen(x, z) {
        return {
            x: w / 2 + (x - z) * (tileSize * 0.7),
            y: h / 1.6 + (x + z) * (tileSize * 0.35)
        };
    }

    class Row {
        constructor(z) {
            this.z = z;
            // First 5 rows are always safe grass
            this.type = z < 5 ? 'GRASS' : rowTypes[Math.floor(Math.random() * rowTypes.length)];
            this.obstacles = [];
            this.speed = (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 2);
            
            if (this.type === 'ROAD') {
                for (let i = 0; i < 2; i++) {
                    this.obstacles.push({ x: (i * 6) - 6 });
                }
            }
        }

        update() {
            this.obstacles.forEach(o => {
                o.x += this.speed * 0.04;
                if (o.x > 8) o.x = -8;
                if (o.x < -8) o.x = 8;
            });
        }

        draw(zOffset) {
            for (let x = -5; x <= 5; x++) {
                const pos = toScreen(x, this.z - zOffset);
                // Draw tile shadow/side
                ctx.fillStyle = this.type === 'GRASS' ? '#6d8c2e' : '#222';
                ctx.beginPath();
                ctx.moveTo(pos.x - tileSize*0.7, pos.y + tileSize*0.35);
                ctx.lineTo(pos.x, pos.y + tileSize*0.7);
                ctx.lineTo(pos.x + tileSize*0.7, pos.y + tileSize*0.35);
                ctx.lineTo(pos.x + tileSize*0.7, pos.y + tileSize*0.45);
                ctx.lineTo(pos.x, pos.y + tileSize*0.8);
                ctx.lineTo(pos.x - tileSize*0.7, pos.y + tileSize*0.45);
                ctx.fill();

                // Draw tile top
                ctx.fillStyle = this.type === 'GRASS' ? '#87af3a' : '#333';
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(pos.x + tileSize*0.7, pos.y + tileSize*0.35);
                ctx.lineTo(pos.x, pos.y + tileSize*0.7);
                ctx.lineTo(pos.x - tileSize*0.7, pos.y + tileSize*0.35);
                ctx.closePath();
                ctx.fill();
            }

            if (this.type === 'ROAD') {
                this.obstacles.forEach(o => {
                    const pos = toScreen(o.x, this.z - zOffset);
                    drawVoxelCar(pos.x, pos.y - 5);
                });
            }
        }
    }

    const player = {
        x: 0, z: 0, zOffset: 0, jumpAnim: 0,
        reset() {
            this.x = 0; this.z = 0; this.zOffset = 0; this.jumpAnim = 0;
            score = 0;
            rows = [];
            for (let i = 0; i < 25; i++) rows.push(new Row(i));
        },
        draw() {
            const pos = toScreen(this.x, this.z - this.zOffset);
            const hopY = Math.sin((this.jumpAnim / 10) * Math.PI) * 25;
            drawVoxelTungTung(pos.x, pos.y - 20 - hopY);
            if (this.jumpAnim > 0) this.jumpAnim--;
            this.zOffset += (this.z - this.zOffset) * 0.15;
        }
    };

    function drawVoxelTungTung(px, py) {
        ctx.save();
        // Hog Body
        ctx.fillStyle = '#ff4d6d';
        ctx.fillRect(px - 18, py, 36, 22);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(px - 18, py, 36, 22);
        // Tusks
        ctx.fillStyle = '#fff';
        ctx.fillRect(px + 12, py + 8, 12, 6);
        // Rider
        ctx.fillStyle = '#d2b48c';
        ctx.fillRect(px - 8, py - 32, 22, 38);
        ctx.strokeRect(px - 8, py - 32, 22, 38);
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(px + 2, py - 28, 7, 7); ctx.fillRect(px + 14, py - 28, 7, 7);
        ctx.fillStyle = '#000';
        ctx.fillRect(px + 5, py - 25, 3, 3); ctx.fillRect(px + 17, py - 25, 3, 3);
        ctx.restore();
    }

    function drawVoxelCar(px, py) {
        ctx.fillStyle = '#f94144';
        ctx.fillRect(px - 28, py, 56, 18);
        ctx.fillStyle = '#90be6d'; // Windows
        ctx.fillRect(px - 15, py + 2, 30, 8);
    }

    // Initialize Game
    player.reset();

    function handleTap() {
        if (state === 'OVER') {
            player.reset();
            state = 'PLAYING';
            msgLabel.innerText = "HOP!";
            return;
        }
        player.z++;
        player.jumpAnim = 10;
        score = Math.max(score, player.z);
        rows.push(new Row(rows[rows.length - 1].z + 1));
    }

    window.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTap();
    });

    function loop() {
        frame++;
        ctx.fillStyle = '#4a6d2f'; // Darker green for background
        ctx.fillRect(0, 0, w, h);

        rows.forEach(r => {
            if (state === 'PLAYING') r.update();
            r.draw(player.zOffset);
        });

        player.draw();

        if (state === 'PLAYING') {
            scoreLabel.innerText = score;
            // Check Collision
            const pRow = rows.find(r => r.z === player.z);
            if (pRow && pRow.type === 'ROAD') {
                pRow.obstacles.forEach(o => {
                    if (Math.abs(o.x - player.x) < 0.9) {
                        state = 'OVER';
                        msgLabel.innerText = "GAME OVER! TAP TO RETRY";
                    }
                });
            }
        }

        if (rows.length > 40) rows.shift();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
