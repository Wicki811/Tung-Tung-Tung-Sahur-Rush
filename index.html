<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Sahur: Sigma Defense</title>
    <style>
        :root { --kfc-red: #d32f2f; --kfc-white: #eeeeee; --sigma-gold: #ffbc0d; }
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; touch-action: none; -webkit-user-select: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; image-rendering: pixelated; margin: 0 auto; background: #000; }
        
        /* UI Styling */
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; color: white; font-weight: bold; font-size: 14px; text-shadow: 2px 2px #000; }
        #timer-display { position: absolute; top: 50px; width: 100%; text-align: center; color: var(--sigma-gold); font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        
        #rest-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; color: white; text-align: center; }
        #shop-menu { position: absolute; inset: 0; background: #222; z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 20px; border: 4px solid var(--kfc-red); color: white; }
        
        .btn-ui { background: var(--kfc-red); color: white; border: 3px solid #fff; padding: 10px 20px; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #shop-trigger { position: absolute; top: 15px; right: 15px; z-index: 20; background: var(--sigma-gold); color: #000; }

        /* Mobile Controls */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        .d-pad { display: flex; gap: 10px; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.15); border: 3px solid #fff; border-radius: 8px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #fire-btn { width: 85px; height: 85px; border-radius: 50%; background: var(--kfc-red); border-color: var(--sigma-gold); }
    </style>
</head>
<body>

    <div id="hud">
        <div>CASH: $<span id="score">0</span></div>
        <div>LV: <span id="lv">1</span></div>
        <div>HP: <span id="hp">100</span></div>
    </div>

    <div id="timer-display">01:00</div>

    <div id="rest-overlay">
        <h1 style="color: var(--sigma-gold)">WAVE CLEAR</h1>
        <p>RE-STOCKING... PREPARE FOR NEXT SHIFT</p>
        <button class="btn-ui" onclick="startWave()">START NEXT WAVE</button>
    </div>

    <button id="shop-trigger" class="btn-ui" onclick="toggleShop()">OPEN SHOP</button>

    <div id="shop-menu">
        <h2 style="color:var(--kfc-red)">KFC PIXEL ARMORY</h2>
        <div style="width: 100%; max-width: 350px;">
            <p>LEVEL UP: <button class="btn-ui" onclick="buyLevel()" id="lvl-cost">$2000</button></p>
            <p>SAHUR'S STICK (NUKE): <button class="btn-ui" onclick="buyNuke()" id="nuke-btn">$25000</button></p>
            <p>FRENCH FRIES (HEAL): <button class="btn-ui" onclick="buyFries()">$600</button></p>
        </div>
        <button class="btn-ui" style="margin-top:20px; background:#555" onclick="toggleShop()">RESUME</button>
    </div>

    <div class="controls">
        <div class="d-pad">
            <div class="ctrl-btn" id="lBtn">LEFT</div>
            <div class="ctrl-btn" id="jBtn">JUMP</div>
            <div class="ctrl-btn" id="rBtn">RIGHT</div>
        </div>
        <div class="ctrl-btn" id="fire-btn">TUNG!</div>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w, h, groundY;
    let score = 0, hp = 100, wave = 1, timeLeft = 60, frame = 0;
    let px = 100, py = 0, dx = 0, dy = 0, facing = 1, isJumping = false;
    let pLv = 1, pSpeed = 8, activeWep = 0, isResting = false, paused = false;
    
    let enemies = [], bullets = [], enemyBullets = [];
    const weapons = [
        { dmg: 25, size: 8, speed: 15, nuke: false, color: '#fff' },
        { dmg: 9999, size: 60, speed: 20, nuke: true, color: '#ffbc0d' }
    ];
    let hasNuke = false;

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.8;
        loop();
    }

    function toggleShop() { 
        paused = !paused; 
        document.getElementById('shop-menu').style.display = paused ? 'flex' : 'none'; 
    }

    function startWave() {
        isResting = false;
        timeLeft = 60;
        enemies = [];
        enemyBullets = [];
        document.getElementById('rest-overlay').style.display = 'none';
    }

    function buyLevel() {
        let cost = 2000 * pLv;
        if (score >= cost) {
            score -= cost; pLv++; pSpeed += 1.5;
            document.getElementById('lv').innerText = pLv;
            document.getElementById('lvl-cost').innerText = "$" + (2000 * pLv);
        }
    }

    function buyNuke() {
        if (score >= 25000) { score -= 25000; hasNuke = true; activeWep = 1; document.getElementById('nuke-btn').innerText = "OWNED"; }
    }

    function buyFries() { if (score >= 600) { score -= 600; hp = 100; } }

    function update() {
        if (paused || isResting) return;
        frame++;

        if (frame % 60 === 0) {
            timeLeft--;
            document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            if (timeLeft <= 0) {
                isResting = true;
                wave++;
                document.getElementById('rest-overlay').style.display = 'flex';
            }
        }

        // Player Physics
        dy += 1.5; py += dy; px += dx;
        if (py > groundY - 60) { py = groundY - 60; dy = 0; isJumping = false; }
        px = Math.max(0, Math.min(w - 40, px));

        // Spawning
        if (frame % Math.max(15, 60 - wave*5) === 0) {
            const isBoss = (frame % 800 === 0);
            enemies.push({
                x: w, y: groundY - (isBoss ? 120 : 70),
                w: isBoss ? 80 : 50, h: isBoss ? 120 : 70,
                hp: (isBoss ? 2000 : 100) + wave * 50,
                speed: isBoss ? 2 : 4 + Math.random() * 2,
                isBoss: isBoss,
                dashCooldown: 0
            });
        }

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.v;
            enemies.forEach((en, j) => {
                if (b.x > en.x && b.x < en.x+en.w && b.y > en.y && b.y < en.y+en.h) {
                    en.hp -= b.dmg;
                    if (!b.nuke) bullets.splice(i, 1);
                    if (en.hp <= 0) { enemies.splice(j, 1); score += en.isBoss ? 5000 : 250; }
                }
            });
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        });

        // Enemies
        enemies.forEach(en => {
            en.x -= en.speed;
            
            if (en.isBoss) {
                if (frame % 70 === 0) enemyBullets.push({x: en.x, y: en.y + 40, vx: -12});
            } else {
                en.dashCooldown++;
                if (en.dashCooldown % 120 === 0) en.x -= 80; // Tackle Dash
            }

            if (px < en.x + en.w && px + 40 > en.x && py < en.y + en.h && py + 60 > en.y) {
                hp -= en.isBoss ? 2 : 0.5;
            }
        });

        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx;
            if (px < eb.x + 10 && px + 40 > eb.x && py < eb.y + 10 && py + 60 > eb.y) {
                hp -= 20; enemyBullets.splice(i, 1);
            }
        });

        if (hp <= 0) location.reload();
        document.getElementById('score').innerText = score;
        document.getElementById('hp').innerText = Math.floor(hp);
    }

    function draw() {
        ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
        
        // Pixel Ground
        ctx.fillStyle = '#333'; ctx.fillRect(0, groundY, w, h - groundY);
        ctx.fillStyle = '#444'; ctx.fillRect(0, groundY, w, 4);

        // Player (KFC Worker Pixel Art)
        ctx.fillStyle = '#fff'; ctx.fillRect(px, py, 40, 60); // Body
        ctx.fillStyle = '#d32f2f'; ctx.fillRect(px, py, 40, 8); // Hat
        ctx.fillStyle = '#000'; ctx.fillRect(px + (facing === 1 ? 30 : 0), py + 30, 15, 6); // Stick

        // Enemies
        enemies.forEach(en => {
            if (en.isBoss) {
                // Sigma Boss (Suit)
                ctx.fillStyle = '#000'; ctx.fillRect(en.x, en.y, en.w, en.h);
                ctx.fillStyle = '#fff'; ctx.fillRect(en.x + 30, en.y + 20, 20, 40); // Tuxedo shirt
            } else {
                // Fat Monster (Dark Pixel Outfit)
                ctx.fillStyle = '#111'; ctx.fillRect(en.x, en.y, en.w, en.h);
                ctx.fillStyle = '#222'; ctx.fillRect(en.x + 10, en.y + 10, en.w - 20, en.h - 20);
            }
        });

        // VFX
        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
        });
        enemyBullets.forEach(eb => {
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 10, 0, Math.PI*2); ctx.fill();
        });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    const input = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    input('lBtn', () => { dx = -pSpeed; facing = -1; }, () => dx = 0);
    input('rBtn', () => { dx = pSpeed; facing = 1; }, () => dx = 0);
    input('jBtn', () => { if (!isJumping) { dy = -25; isJumping = true; } });
    input('fire-btn', () => {
        const wp = weapons[activeWep];
        bullets.push({ x: px + 20, y: py + 30, v: facing * wp.speed, dmg: wp.dmg, size: wp.size, nuke: wp.nuke, color: wp.color });
    });

    init();
</script>
</body>
</html>
