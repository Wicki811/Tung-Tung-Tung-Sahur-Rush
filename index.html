<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Metal Sahur: Unified Controls</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; padding: 0; overflow: hidden; background: #d1d1d1; touch-action: none; -webkit-user-select: none; font-family: 'Courier New', monospace; }
        canvas { display: block; image-rendering: pixelated; }
        
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 0.9rem; z-index: 10; pointer-events: none; font-weight: bold; color: #000; }
        #boss-ui { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); width: 280px; text-align: center; display: none; }
        #boss-hp-bar { width: 100%; height: 12px; background: #fff; border: 3px solid #000; margin-top: 5px; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; }

        #shop-menu { position: absolute; inset: 0; background: rgba(240,240,240,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .shop-section { width: 90%; max-width: 400px; margin-bottom: 20px; }
        .shop-item { background: #fff; border: 3px solid #000; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; font-size: 0.8rem; }
        .shop-item button { background: #000; color: #fff; border: none; padding: 8px 12px; font-weight: bold; }
        
        #shop-btn { position: absolute; top: 15px; right: 15px; background: #000; color: #fff; padding: 10px 15px; border-radius: 8px; z-index: 20; border: none; font-weight: bold; }

        /* Unified Movement Cluster */
        .controls { position: absolute; bottom: calc(var(--safe-bottom) + 30px); width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        .move-group { display: flex; gap: 10px; align-items: center; }
        
        .btn { width: 70px; height: 70px; border: 4px solid #000; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,255,255,0.9); border-radius: 12px; font-size: 0.7rem; }
        #jumpBtn { background: #eee; border-style: double; }
        #shootBtn { border-color: #ff0000; color: #ff0000; width: 90px; height: 90px; border-radius: 50%; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="hud">
        <div>$ <span id="score">0</span></div>
        <div>ARMOR: <span id="armor">0</span></div>
        <div>HP: <span id="hp">100</span></div>
        <div>LV: <span id="game-lv">1</span></div>
    </div>

    <div id="boss-ui">
        <div style="font-weight:bold; color:red;">BOSS UNIT ACTIVE</div>
        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    </div>

    <button id="shop-btn" onclick="toggleShop()">SHOP</button>

    <div id="shop-menu">
        <h2 style="margin-top:0">BATTLE ARMORY</h2>
        <div class="shop-section">
            <div style="font-weight:bold; border-bottom: 2px solid #000;">WEAPONS</div>
            <div class="shop-item"><span>PISTOL</span><button onclick="buyWeapon(0)">EQUIP</button></div>
            <div class="shop-item"><span>SMG</span><button onclick="buyWeapon(1)" id="w-1">$1200</button></div>
            <div class="shop-item"><span>SHOTGUN</span><button onclick="buyWeapon(2)" id="w-2">$2500</button></div>
            <div class="shop-item"><span>SNIPER</span><button onclick="buyWeapon(3)" id="w-3">$4000</button></div>
            <div class="shop-item"><span>PLASMA</span><button onclick="buyWeapon(4)" id="w-4">$7000</button></div>
        </div>
        <div class="shop-section">
            <div style="font-weight:bold; border-bottom: 2px solid #000;">DEFENSE</div>
            <div class="shop-item"><span>ARMOR (+50)</span><button onclick="buyArmor()">$1000</button></div>
            <div class="shop-item"><span>MED-KIT</span><button onclick="buyHeal()">$500</button></div>
        </div>
        <button onclick="toggleShop()" style="padding: 15px 40px; background: #000; color: #fff; border:none; border-radius:8px; font-weight:bold;">RESUME</button>
    </div>

    <div class="controls">
        <div class="move-group">
            <div class="btn" id="lBtn">LEFT</div>
            <div class="btn" id="jumpBtn">JUMP</div>
            <div class="btn" id="rBtn">RIGHT</div>
        </div>
        <div class="btn" id="shootBtn">FIRE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, groundY, score = 0, hp = 100, armor = 0, frame = 0, paused = false;
    let enemies = [], bullets = [], enemyBullets = [];
    let px = 100, py = 0, dy = 0, dx = 0, facing = 1, isJumping = false;
    let boss = null, worldLevel = 1, shootHeat = 0;

    const weapons = [
        { name: 'Pistol', dmg: 1, heat: 20, cool: 1, multi: 1 },
        { name: 'SMG', dmg: 0.8, heat: 12, cool: 1.5, multi: 1 },
        { name: 'Shotgun', dmg: 2, heat: 40, cool: 0.8, multi: 3 },
        { name: 'Sniper', dmg: 5, heat: 50, cool: 0.5, multi: 1 },
        { name: 'Plasma', dmg: 8, heat: 60, cool: 0.4, multi: 1 }
    ];
    let currentWeapon = 0;
    let ownedWeapons = [true, false, false, false, false];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.8;
    }
    window.addEventListener('resize', resize);
    resize();

    function toggleShop() { paused = !paused; document.getElementById('shop-menu').style.display = paused ? 'flex' : 'none'; }
    function buyWeapon(idx) {
        const prices = [0, 1200, 2500, 4000, 7000];
        if (!ownedWeapons[idx] && score >= prices[idx]) { score -= prices[idx]; ownedWeapons[idx] = true; document.getElementById('w-'+idx).innerText = "EQUIP"; }
        else if (ownedWeapons[idx]) currentWeapon = idx;
    }
    function buyArmor() { if(score >= 1000) { score -= 1000; armor += 50; } }
    function buyHeal() { if(score >= 500) { score -= 500; hp = 100; } }

    function takeDamage(amt) {
        if (armor > 0) { armor -= amt; if (armor < 0) { hp += armor; armor = 0; } }
        else hp -= amt;
    }

    function update() {
        if (paused) return;
        frame++;
        shootHeat = Math.max(0, shootHeat - weapons[currentWeapon].cool);

        if (frame % 3600 === 0 && !boss) {
            boss = { x: w, y: groundY - 160, w: 200, h: 160, hp: 200 * worldLevel, max: 200 * worldLevel };
            document.getElementById('boss-ui').style.display = 'block';
        }

        dy += 1.6; py += dy; px += dx;
        if (py > groundY - 80) { py = groundY - 80; dy = 0; isJumping = false; }
        px = Math.max(0, Math.min(w - 80, px));

        if (frame % 80 === 0 && !boss) enemies.push({ x: w, y: groundY-70, w:45, h:70, color:'#2e7d32', hp:2*worldLevel, speed:3+worldLevel });

        for(let i = bullets.length-1; i>=0; i--) {
            let b = bullets[i]; b.x += b.v;
            if (boss && b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y) {
                boss.hp -= b.dmg; bullets.splice(i, 1);
                document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.max*100) + "%";
                if (boss.hp <= 0) { boss = null; score += 5000; worldLevel++; document.getElementById('boss-ui').style.display = 'none'; }
                continue;
            }
            enemies.forEach((en, j) => { if(b.x > en.x && b.x < en.x+en.w && b.y > en.y) { en.hp -= b.dmg; bullets.splice(i, 1); if(en.hp <= 0) { enemies.splice(j, 1); score += 200; } } });
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        }

        enemyBullets.forEach((eb, i) => { eb.x += eb.vx; if(eb.x > px && eb.x < px+60 && eb.y > py && eb.y < py+80) { takeDamage(20); enemyBullets.splice(i, 1); } });
        enemies.forEach(en => { en.x -= en.speed; if(px+45 > en.x && px < en.x+en.w && py+75 > en.y) takeDamage(1); });

        if (hp <= 0) location.reload();
        document.getElementById('score').innerText = score;
        document.getElementById('hp').innerText = Math.max(0, Math.floor(hp));
        document.getElementById('armor').innerText = Math.floor(armor);
        document.getElementById('game-lv').innerText = worldLevel;
    }

    function draw() {
        ctx.fillStyle = '#d1d1d1'; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#444'; ctx.fillRect(0, groundY, w, h - groundY);
        
        ctx.fillStyle = '#333'; ctx.fillRect(px+5, py-20, 50, 8);
        ctx.fillStyle = shootHeat > 80 ? '#f00' : '#ff0'; ctx.fillRect(px+5, py-20, (shootHeat/100)*50, 8);

        ctx.save(); ctx.translate(px+40, py+40); if(facing === -1) ctx.scale(-1, 1);
        if(armor > 0) { ctx.strokeStyle = '#00f'; ctx.lineWidth = 4; ctx.strokeRect(-24, -40, 48, 80); }
        ctx.fillStyle = '#222'; ctx.fillRect(-22, -38, 44, 76); 
        ctx.fillStyle = '#fff'; ctx.fillRect(-12, -24, 8, 8); ctx.fillRect(4, -24, 8, 8);
        ctx.restore();

        bullets.forEach(b => { ctx.fillStyle = '#000'; ctx.fillRect(b.x, b.y, 25, 8); });
        enemies.forEach(en => { ctx.fillStyle = en.color; ctx.fillRect(en.x, en.y, en.w, en.h); ctx.strokeStyle = '#000'; ctx.strokeRect(en.x, en.y, en.w, en.h); });
        if (boss) { ctx.fillStyle = '#222'; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); ctx.strokeStyle = '#f00'; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h); }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    const ctrl = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };
    ctrl('lBtn', () => { dx = -8; facing = -1; }, () => { dx = 0; });
    ctrl('rBtn', () => { dx = 8; facing = 1; }, () => { dx = 0; });
    ctrl('jumpBtn', () => { if (!isJumping) { dy = -28; isJumping = true; } });
    ctrl('shootBtn', () => {
        const wp = weapons[currentWeapon];
        if (shootHeat < 95) {
            for(let i=0; i<wp.multi; i++) bullets.push({ x: px+(facing===1?70:10), y: py+45+(i*10-(wp.multi-1)*5), v: facing*18, dmg: wp.dmg });
            shootHeat += wp.heat;
        }
    });
    loop();
</script>
</body>
</html>
