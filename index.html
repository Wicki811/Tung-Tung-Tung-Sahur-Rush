<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung iPad Edition</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #1a1a1a; font-family: 'Arial Black', sans-serif;
            touch-action: none; /* Prevents zooming/scrolling while playing */
        }
        canvas { display: block; background: #87CEEB; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 30px; text-shadow: 3px 3px 0 #000;
            pointer-events: none;
        }
        .menu {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            background: rgba(0,0,0,0.8); padding: 30px;
            border-radius: 20px; border: 5px solid #ffcc00;
            width: 80%; max-width: 400px;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            background: #ffcc00; border: none; border-radius: 10px;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>

    <div id="start-menu" class="menu">
        <h1>TUNG TUNG RUSH</h1>
        <p>TAP SCREEN TO JUMP</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startMenu = document.getElementById('start-menu');

    // Resize canvas for iPad
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let gameState = 'START';
    let score = 0;
    let gameSpeed = 6;
    let frames = 0;

    const player = {
        x: 100, y: 0, w: 70, h: 90,
        dy: 0, jump: -15, gravity: 0.8, grounded: false,
        draw() {
            // Draw Tung Tung (Brown Cylinder)
            ctx.fillStyle = '#d2b48c';
            ctx.fillRect(this.x + 15, this.y, 40, 50);
            
            // Draw Hog (Pink Body)
            ctx.fillStyle = '#ffc0cb';
            ctx.fillRect(this.x, this.y + 45, 70, 45);
            
            // Draw Bat
            ctx.fillStyle = '#8B4513';
            ctx.save();
            ctx.translate(this.x + 60, this.y + 20);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(0, 0, 10, 50);
            ctx.restore();
        },
        update() {
            if (gameState !== 'PLAYING') return;
            this.dy += this.gravity;
            this.y += this.dy;

            const groundY = canvas.height - 140;
            if (this.y > groundY) {
                this.y = groundY;
                this.dy = 0;
                this.grounded = true;
            }
        }
    };

    let obstacles = [];
    function spawnObstacle() {
        const h = 60;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - 110 - h,
            w: 50, h: h,
            color: Math.random() > 0.5 ? '#333' : '#5C4033'
        });
    }

    function startGame() {
        score = 0;
        obstacles = [];
        gameSpeed = 7;
        gameState = 'PLAYING';
        startMenu.style.display = 'none';
        player.y = canvas.height - 300;
    }

    function jump() {
        if (gameState === 'PLAYING' && player.grounded) {
            player.dy = player.jump;
            player.grounded = false;
        } else if (gameState === 'OVER') {
            startGame();
        }
    }

    // Touch Support for iPad
    window.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Prevents flickering
        jump();
    }, { passive: false });

    // Keyboard Support
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') jump();
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Sky/Grass
        ctx.fillStyle = '#4CAF50'; // Grass
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        player.update();
        player.draw();

        if (gameState === 'PLAYING') {
            frames++;
            if (frames % 90 === 0) spawnObstacle();
            
            obstacles.forEach((o, i) => {
                o.x -= gameSpeed;
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision
                if (player.x < o.x + o.w && player.x + player.w > o.x &&
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    gameState = 'START';
                    startMenu.style.display = 'block';
                    startMenu.innerHTML = `<h1>GAME OVER!</h1><p>Score: ${score}</p><button onclick="startGame()">TRY AGAIN</button>`;
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (score % 5 === 0) gameSpeed += 0.5;
                }
            });
        }
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
