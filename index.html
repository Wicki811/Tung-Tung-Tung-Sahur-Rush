<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Metal Sahur - Fix</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 30px); }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* UI HUD */
        #hud { position: absolute; top: 40px; width: 100%; display: flex; justify-content: space-around; color: #0f0; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; z-index: 10; pointer-events: none; }
        
        /* CONTROLS - Positioned for iPad Thumbs */
        .controls { position: absolute; bottom: calc(var(--safe-bottom) + 100px); width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 100; }
        .dir-pad { display: flex; gap: 15px; }
        .btn { width: 90px; height: 90px; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #222; color: #fff; box-shadow: 4px 4px 0 #555; border-radius: 10px; }
        #jumpBtn { border-color: #0ff; color: #0ff; }
        #shootBtn { border-color: #f00; color: #f00; width: 110px; height: 110px; font-size: 1.2rem; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; background: #444; }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">3</span></div>
    </div>

    <div class="controls">
        <div class="dir-pad">
            <div class="btn" id="lBtn">LEFT</div>
            <div class="btn" id="rBtn">RIGHT</div>
        </div>
        <div class="btn" id="jumpBtn">JUMP</div>
        <div class="btn" id="shootBtn">FIRE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let w, h, groundY, score = 0, hp = 3, frame = 0;
    let enemies = [], bullets = [], playerX = 100, playerY = 0, dy = 0, dx = 0;
    let facing = 1, isJumping = false;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.8;
    }
    window.addEventListener('resize', resize);
    resize();

    // DRAW PIXEL TUNG TUNG (Since PNG might be blocked)
    function drawPlayer(x, y, dir) {
        ctx.save();
        ctx.translate(x + 60, y + 60);
        if (dir === -1) ctx.scale(-1, 1);
        
        // Body (The Log Shape)
        ctx.fillStyle = '#d2b48c';
        ctx.fillRect(-30, -50, 60, 100);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        ctx.strokeRect(-30, -50, 60, 100);
        
        // Eyes (Classic Stare)
        ctx.fillStyle = '#fff';
        ctx.fillRect(-20, -35, 15, 15); ctx.fillRect(5, -35, 15, 15);
        ctx.fillStyle = '#000';
        ctx.fillRect(-15, -30, 6, 6); ctx.fillRect(10, -30, 6, 6);

        // Gun
        ctx.fillStyle = '#555';
        ctx.fillRect(20, 0, 30, 10);
        
        ctx.restore();
    }

    function spawnEnemy() {
        if (frame % 100 === 0) {
            enemies.push({ x: w, y: groundY - 80, w: 50, h: 80, speed: 3 + Math.random() * 2 });
        }
    }

    function update() {
        frame++;
        dy += 1.2; // Gravity
        playerY += dy;
        playerX += dx;

        if (playerY > groundY - 110) {
            playerY = groundY - 110;
            dy = 0;
            isJumping = false;
        }
        if (playerX < 0) playerX = 0;
        if (playerX > w - 120) playerX = w - 120;

        // Update Bullets
        bullets.forEach((b, i) => {
            b.x += b.v;
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        });

        // Update Enemies
        enemies.forEach((en, i) => {
            en.x -= en.speed;
            
            // Bullet Collision
            bullets.forEach((b, bi) => {
                if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 100;
                    document.getElementById('score').innerText = score;
                }
            });

            // Player Collision
            if (playerX + 40 > en.x && playerX < en.x + en.w && playerY + 100 > en.y) {
                enemies.splice(i, 1);
                hp--;
                document.getElementById('hp').innerText = hp;
                if (hp <= 0) location.reload();
            }
        });
    }

    function draw() {
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, w, h); // BG
        ctx.fillStyle = '#333'; ctx.fillRect(0, groundY, w, h - groundY); // Floor
        ctx.strokeStyle = '#0f0'; ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(w, groundY); ctx.stroke();

        drawPlayer(playerX, playerY, facing);

        bullets.forEach(b => {
            ctx.fillStyle = '#ff0';
            ctx.fillRect(b.x, b.y, 15, 5);
        });

        enemies.forEach(en => {
            ctx.fillStyle = '#8b0000'; // Dark Red Soldier
            ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = '#fff'; ctx.fillRect(en.x + 10, en.y + 10, 8, 8); // Eye
        });
    }

    function loop() {
        update();
        draw();
        spawnEnemy();
        requestAnimationFrame(loop);
    }

    // CONTROLS
    const handleAction = (id, start, end) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
    };

    handleAction('lBtn', () => { dx = -6; facing = -1; }, () => { dx = 0; });
    handleAction('rBtn', () => { dx = 6; facing = 1; }, () => { dx = 0; });
    handleAction('jumpBtn', () => { if (!isJumping) { dy = -25; isJumping = true; } });
    handleAction('shootBtn', () => {
        bullets.push({ x: playerX + (facing === 1 ? 80 : 0), y: playerY + 65, v: facing * 12 });
    });

    loop();
</script>
</body>
</html>
