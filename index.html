<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung Sahur: INSANE</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a2a0a; font-family: 'Arial Black', sans-serif; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; top: 20px; left: 20px; }
        .hp-container { width: 200px; height: 20px; background: #222; border: 3px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600); transition: 0.1s; }
        .score { color: gold; font-size: 38px; text-shadow: 4px 4px 0 #000; margin-top: 5px; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 30px; border: 5px solid gold; display: block; }
        button { padding: 15px 30px; font-size: 24px; background: gold; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud">
            <div class="hp-container"><div id="hp-bar"></div></div>
            <div id="score" class="score">0</div>
        </div>
        <div id="msg">
            <h1 style="font-size: 50px; margin: 0;">SAHUR WAR</h1>
            <p>DOUBLE JUMP ENABLED</p>
            <button onclick="start()">START SHOW</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpBar = document.getElementById('hp-bar');
    const scoreEl = document.getElementById('score');
    const msg = document.getElementById('msg');

    let w, h, groundY;
    let shake = 0;
    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h - 150;
    }
    window.addEventListener('resize', resize);
    resize();

    let state = 'MENU';
    let score = 0;
    let hp = 100;
    let speed = 12; // Starting at high speed
    let frame = 0;
    let obstacles = [];

    const player = {
        x: 150, y: 0, dy: 0, jumps: 0, 
        draw() {
            ctx.save();
            if(shake > 0) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
            
            let px = this.x, py = this.y;
            // 3D Hog
            let g1 = ctx.createRadialGradient(px+30, py+50, 10, px+40, py+60, 60);
            g1.addColorStop(0, '#ff99ac'); g1.addColorStop(1, '#e63946');
            ctx.fillStyle = g1;
            ctx.beginPath(); ctx.ellipse(px+40, py+65, 55, 35, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            
            // Tusks
            ctx.fillStyle = '#fff'; ctx.beginPath();
            ctx.moveTo(px+80, py+65); ctx.quadraticCurveTo(px+110, py+35, px+90, py+80); ctx.fill(); ctx.stroke();

            // Tung Tung Cylinder
            let g2 = ctx.createLinearGradient(px+20, py, px+60, py);
            g2.addColorStop(0, '#a67c52'); g2.addColorStop(0.5, '#d2b48c'); g2.addColorStop(1, '#fff');
            ctx.fillStyle = g2;
            ctx.beginPath(); ctx.roundRect(px+20, py-10, 45, 80, [25, 25, 5, 5]); ctx.fill(); ctx.stroke();

            // The Face (High Quality)
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(px+33, py+18, 10, 0, Math.PI*2); ctx.arc(px+56, py+18, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(px+35, py+18, 5, 0, Math.PI*2); ctx.arc(px+58, py+18, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#440000'; ctx.beginPath(); ctx.ellipse(px+45, py+42, 12, 15, 0, 0, Math.PI*2); ctx.fill();

            // Bat
            ctx.save(); ctx.translate(px+65, py+55); ctx.rotate(-Math.PI/3);
            ctx.fillStyle = '#8B4513'; ctx.fillRect(0, -65, 16, 75); ctx.strokeRect(0, -65, 16, 75);
            ctx.restore(); ctx.restore();
        },
        update() {
            if(state !== 'PLAY') return;
            this.dy += 1.4; // Stronger Gravity
            this.y += this.dy;
            if(this.y > groundY - 100) { this.y = groundY - 100; this.dy = 0; this.jumps = 0; }
        }
    };

    function start() {
        score = 0; hp = 100; speed = 12; obstacles = []; state = 'PLAY';
        msg.style.display = 'none';
        scoreEl.innerText = "0";
        hpBar.style.width = '100%';
    }

    function jump() {
        if(state === 'PLAY' && player.jumps < 2) {
            player.dy = -22;
            player.jumps++;
        }
    }

    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
    window.addEventListener('mousedown', jump);

    function loop() {
        frame++;
        if(shake > 0) shake *= 0.9;
        ctx.clearRect(0, 0, w, h);

        // Sky Box
        let sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, '#1e3c72'); sky.addColorStop(1, '#2a5298');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

        // Background Towers (From Image)
        ctx.fillStyle = '#444';
        for(let i=0; i<3; i++) {
            let tx = (w + (i*600) - frame*4) % (w+400) - 200;
            ctx.fillRect(tx, h-350, 80, 250);
            ctx.fillStyle = '#222'; ctx.fillRect(tx-10, h-360, 100, 30); ctx.fillStyle = '#444';
        }

        // Ground
        ctx.fillStyle = '#1b4332'; ctx.fillRect(0, groundY + 10, w, h);

        if(state === 'PLAY') {
            player.update();
            
            // Random High-Difficulty Spawning
            if(frame % 45 === 0) {
                let r = Math.random();
                if(r < 0.4) obstacles.push({x: w, y: groundY - 30, type: 'BOMB', w: 50, h: 50});
                else if(r < 0.7) obstacles.push({x: w, y: groundY - 180, type: 'ARROW', w: 60, h: 10});
                else obstacles.push({x: w, y: groundY - 60, type: 'TOWER', w: 60, h: 150});
            }

            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.fillStyle = o.type === 'BOMB' ? '#000' : (o.type === 'ARROW' ? '#fff' : '#5d4037');
                if(o.type === 'BOMB') { ctx.beginPath(); ctx.arc(o.x+25, o.y+25, 25, 0, Math.PI*2); ctx.fill(); }
                else ctx.fillRect(o.x, o.y, o.w, o.h);

                // Precise Collision
                if(player.x + 80 > o.x && player.x < o.x + o.w && player.y + 100 > o.y && player.y < o.y + o.h) {
                    hp -= 34; shake = 20;
                    obstacles.splice(i, 1);
                    hpBar.style.width = hp + '%';
                    if(hp <= 0) { state = 'MENU'; msg.style.display = 'block'; msg.innerHTML = `<h1>WASTED</h1><p>SCORE: ${score}</p><button onclick="start()">RETRY</button>`; }
                }
                if(o.x < -100) { obstacles.splice(i, 1); score++; speed += 0.25; scoreEl.innerText = score; }
            });
        }

        player.draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
