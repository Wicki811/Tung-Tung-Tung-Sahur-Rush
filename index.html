<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung Road Rush Pixel</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 30px); }
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #000; 
            font-family: 'Courier New', Courier, monospace; touch-action: none; 
            -webkit-user-select: none;
        }
        #viewport {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        canvas { 
            background: #4facfe; 
            border: 6px solid #ffd700; 
            border-radius: 10px;
            image-rendering: pixelated; /* Forces sharp pixel art look */
            max-width: 95%; max-height: 75%;
        }
        #hud {
            position: absolute; top: 25px; width: 90%;
            display: flex; justify-content: space-between;
            color: white; font-weight: bold; font-size: 1.2rem;
            text-shadow: 2px 2px 0 #000; z-index: 10;
        }
        /* IPAD BUTTON FIX: Anchored significantly higher for thumb comfort */
        .controls {
            position: absolute; bottom: calc(var(--safe-bottom) + 60px);
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 50px; box-sizing: border-box; pointer-events: none;
        }
        .btn {
            width: 110px; height: 110px; border-radius: 15px;
            border: 4px solid #fff; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; text-shadow: 2px 2px 0 #000;
            box-shadow: 0 10px 0 #222; transition: 0.1s;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #222; }
        #jumpBtn { background: #8b4513; }
        #attackBtn { background: #c0392b; }
        
        #wicki { position: absolute; top: 5px; right: 20px; color: #fff; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="wicki">by wicki</div>
    <div id="hud">
        <div>SCORE: <span id="score">000000</span></div>
        <div>LIVES: <span id="lives">3</span></div>
        <div><span id="dist">0</span>m</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div id="jumpBtn" class="btn">JUMP</div>
        <div id="attackBtn" class="btn">ATTACK</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let w, h, groundY, score = 0, lives = 3, distance = 0, frame = 0, speed = 8;
    let entities = [];

    function setup() {
        canvas.width = 1000; canvas.height = 600;
        w = canvas.width; h = canvas.height;
        groundY = h - 100;
    }
    setup();

    const player = {
        x: 120, y: 0, dy: 0, jumping: false, attacking: 0,
        update() {
            this.dy += 1.5; this.y += this.dy;
            if (this.y > groundY - 140) { this.y = groundY - 140; this.dy = 0; this.jumping = false; }
            if (this.attacking > 0) this.attacking--;
            distance += speed / 30;
            document.getElementById('dist').innerText = Math.floor(distance);
            speed += 0.001; // Increasing challenge
        },
        draw() {
            ctx.save();
            const px = this.x; const py = this.y;

            // PIXEL HOG
            ctx.fillStyle = '#ffafcc'; ctx.fillRect(px, py + 80, 110, 60);
            ctx.fillStyle = '#000'; ctx.fillRect(px + 85, py + 95, 10, 10); // Eye
            ctx.fillStyle = '#fff'; ctx.fillRect(px + 105, py + 105, 15, 8); // Tusk

            // PIXEL TUNG TUNG (Rider)
            ctx.fillStyle = '#d2b48c'; ctx.fillRect(px + 35, py + 10, 40, 85);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.strokeRect(px + 35, py + 10, 40, 85);
            
            // Waving arm
            ctx.beginPath(); ctx.moveTo(px + 75, py + 40); ctx.lineTo(px + 100, py + 20); ctx.stroke();

            // Face
            ctx.fillStyle = '#fff'; ctx.fillRect(px + 42, py + 25, 8, 8); ctx.fillRect(px + 58, py + 25, 8, 8);
            ctx.fillStyle = '#000'; ctx.fillRect(px + 44, py + 27, 4, 4); ctx.fillRect(px + 60, py + 27, 4, 4);

            // Bat Visual (High Quality Swing)
            if (this.attacking > 0) {
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(px + 60, py + 40, 70, 15);
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; // Swing Trail
                ctx.fillRect(px + 60, py + 20, 70, 20);
            } else {
                ctx.fillStyle = '#8b4513'; ctx.fillRect(px + 20, py + 50, 15, 60);
            }
            ctx.restore();
        }
    };

    function spawn() {
        if (frame % 70 === 0) {
            const rand = Math.random();
            if (rand < 0.4) {
                // BOX (Ground obstacle)
                entities.push({ x: w, y: groundY - 70, type: 'BOX', w: 70, h: 70 });
            } else if (rand < 0.7) {
                // BOMB (Ground obstacle)
                entities.push({ x: w, y: groundY - 40, type: 'BOMB', w: 50, h: 50 });
            } else {
                // BAT MONSTER (Air attacker)
                entities.push({ x: w, y: groundY - 180 + Math.sin(frame/10)*20, type: 'BAT', w: 60, h: 40, wing: 0 });
            }
        }
    }

    function drawWorld() {
        // Sky
        ctx.fillStyle = '#4facfe'; ctx.fillRect(0, 0, w, groundY);
        // Grass
        ctx.fillStyle = '#87af3a'; ctx.fillRect(0, groundY - 30, w, 30);
        // Road
        ctx.fillStyle = '#333'; ctx.fillRect(0, groundY, w, h - groundY);
        // Lines
        ctx.fillStyle = '#fff';
        for(let i=0; i<10; i++) ctx.fillRect((i*220 - (frame*speed)%220), groundY + 40, 60, 12);
        
        // Distant Houses/Towers (Pixel feel)
        ctx.fillStyle = '#555'; ctx.fillRect(w - ((frame*2)% (w+200)), groundY - 150, 80, 120);
    }

    const jump = () => { if (!player.jumping) { player.dy = -26; player.jumping = true; }};
    const attack = () => { player.attacking = 12; };

    document.getElementById('jumpBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); jump(); });
    document.getElementById('attackBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); attack(); });

    function loop() {
        frame++; ctx.clearRect(0, 0, w, h);
        drawWorld();
        player.update();
        player.draw();
        spawn();

        entities.forEach((ent, i) => {
            ent.x -= speed;
            if (ent.type === 'BOX') {
                ctx.fillStyle = '#5d4037'; ctx.fillRect(ent.x, ent.y, ent.w, ent.h);
                ctx.strokeStyle = '#fff'; ctx.strokeRect(ent.x+8, ent.y+8, ent.w-16, ent.h-16);
            } else if (ent.type === 'BOMB') {
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ent.x+25, ent.y+25, 25, 0, Math.PI*2); ctx.fill();
            } else if (ent.type === 'BAT') {
                // Animated Bat
                ctx.fillStyle = '#2d004d';
                ctx.fillRect(ent.x, ent.y, ent.w, ent.h/2);
                let wingPos = Math.sin(frame*0.5) * 20;
                ctx.fillRect(ent.x - 20, ent.y + wingPos, 20, 10);
                ctx.fillRect(ent.x + ent.w, ent.y + wingPos, 20, 10);
                ctx.fillStyle = '#ff0000'; ctx.fillRect(ent.x+10, ent.y+5, 5, 5); ctx.fillRect(ent.x+40, ent.y+5, 5, 5);
            }

            // Hit Logic
            if (player.x + 90 > ent.x && player.x < ent.x + ent.w && player.y + 120 > ent.y && player.y < ent.y + ent.h + 80) {
                if (player.attacking > 0) {
                    entities.splice(i, 1); score += 250;
                    document.getElementById('score').innerText = score.toString().padStart(6, '0');
                } else {
                    lives--; document.getElementById('lives').innerText = lives;
                    entities.splice(i, 1);
                    if (lives <= 0) location.reload();
                }
            }
            if (ent.x < -200) entities.splice(i, 1);
        });
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
