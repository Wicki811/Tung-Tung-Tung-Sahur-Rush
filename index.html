<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung iPad Fixed</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #87CEEB; font-family: 'Arial Black', sans-serif;
            touch-action: none; -webkit-user-select: none;
        }
        canvas { display: block; }
        #ui-text {
            position: absolute; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%);
            color: white; text-shadow: 4px 4px 0 #000;
            pointer-events: none;
        }
        #score-board {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 30px; text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>

    <div id="score-board">SCORE: 0</div>
    <div id="ui-text">
        <h1 id="main-title">TUNG TUNG RUSH</h1>
        <p id="sub-title">TAP ANYWHERE TO START</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const mainTitle = document.getElementById('main-title');
    const subTitle = document.getElementById('sub-title');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let gameState = 'START';
    let score = 0;
    let gameSpeed = 7;
    let obstacles = [];
    let frameCount = 0;

    const player = {
        x: 80, y: 0, w: 60, h: 80,
        dy: 0, jump: -16, gravity: 0.8,
        draw() {
            ctx.fillStyle = '#d2b48c'; // Tung Tung
            ctx.fillRect(this.x + 10, this.y, 40, 50);
            ctx.fillStyle = '#ffc0cb'; // Hog
            ctx.fillRect(this.x, this.y + 40, 70, 40);
        }
    };

    function spawn() {
        if (Math.random() < 0.02) {
            obstacles.push({ x: canvas.width, y: canvas.height - 150, w: 50, h: 50 });
        }
    }

    function handleAction() {
        if (gameState === 'START' || gameState === 'OVER') {
            // Start the game
            gameState = 'PLAYING';
            score = 0;
            obstacles = [];
            gameSpeed = 7;
            player.y = canvas.height - 180;
            mainTitle.style.display = 'none';
            subTitle.style.display = 'none';
        } else if (gameState === 'PLAYING' && player.y >= canvas.height - 181) {
            // Jump
            player.dy = player.jump;
        }
    }

    // Single trigger for all iPad/iPhone touch interactions
    window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleAction();
    }, { passive: false });

    // Keyboard support for testing
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleAction(); });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ground
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        if (gameState === 'PLAYING') {
            // Physics
            player.dy += player.gravity;
            player.y += player.dy;
            if (player.y > canvas.height - 180) {
                player.y = canvas.height - 180;
                player.dy = 0;
            }

            spawn();
            obstacles.forEach((o, i) => {
                o.x -= gameSpeed;
                ctx.fillStyle = '#333';
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision
                if (player.x < o.x + o.w && player.x + 60 > o.x &&
                    player.y < o.y + o.h && player.y + 80 > o.y) {
                    gameState = 'OVER';
                    mainTitle.innerText = "GAME OVER";
                    mainTitle.style.display = 'block';
                    subTitle.innerText = "TAP TO TRY AGAIN";
                    subTitle.style.display = 'block';
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreBoard.innerText = "SCORE: " + score;
                    gameSpeed += 0.1;
                }
            });
        }
        
        player.draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
