<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Metal Sahur: Tactical Boss</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; touch-action: none; -webkit-user-select: none; font-family: 'Courier New', monospace; color: #fff; }
        canvas { display: block; image-rendering: pixelated; }
        
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 0.9rem; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        
        /* SHOP & BOSS UI */
        #shop-menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .shop-item { background: #1a1a1a; border: 2px solid #555; padding: 10px; margin: 5px; width: 220px; display: flex; justify-content: space-between; border-radius: 8px; font-size: 0.8rem; }
        
        #boss-ui { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 220px; text-align: center; display: none; }
        #boss-hp-bar { width: 100%; height: 10px; background: #222; border: 1px solid #fff; margin-top: 5px; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; }

        #shop-btn { position: absolute; top: 15px; right: 15px; background: #ffcc00; padding: 6px 12px; font-size: 0.7rem; border-radius: 4px; z-index: 20; border: none; font-weight: bold; }

        /* COMPACT BUTTONS */
        .controls { position: absolute; bottom: calc(var(--safe-bottom) + 40px); width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 100; }
        .btn { width: 65px; height: 65px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,255,255,0.1); color: #fff; border-radius: 10px; font-size: 0.6rem; }
        #shootBtn { border-color: #ff5252; color: #ff5252; width: 80px; height: 80px; border-radius: 50%; font-size: 0.9rem; }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span></div>
        <div>BOSS IN: <span id="boss-timer">60</span>s</div>
    </div>

    <div id="boss-ui">
        <div style="color:#ff5252; font-weight:bold; font-size: 0.7rem;">BOSS DETECTED</div>
        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    </div>

    <button id="shop-btn" onclick="toggleShop()">SHOP</button>

    <div id="shop-menu">
        <h2 style="color:#ffcc00; font-size: 1.2rem;">ARMORY</h2>
        <div class="shop-item"><span>FIRE RATE</span><button onclick="buy('rate')" id="b-rate">500</button></div>
        <div class="shop-item"><span>DAMAGE</span><button onclick="buy('dmg')" id="b-dmg">800</button></div>
        <div class="shop-item"><span>HEAL</span><button onclick="buy('heal')">300</button></div>
        <button onclick="toggleShop()" style="margin-top: 20px; padding: 8px 25px; font-family: inherit;">RESUME</button>
    </div>

    <div class="controls">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="lBtn">LEFT</div>
            <div class="btn" id="rBtn">RIGHT</div>
        </div>
        <div class="btn" id="jumpBtn">JUMP</div>
        <div class="btn" id="shootBtn">FIRE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, groundY, score = 0, hp = 100, frame = 0, seconds = 0, paused = false;
    let enemies = [], bullets = [], px = 100, py = 0, dy = 0, dx = 0, facing = 1, isJumping = false;
    let boss = null, up = { rate: 1, dmg: 1, rP: 500, dP: 800 };

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h * 0.85;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawPlayer(x, y, dir) {
        ctx.save();
        ctx.translate(x + 40, y + 40);
        if (dir === -1) ctx.scale(-1, 1);
        ctx.fillStyle = '#8b5a2b'; ctx.fillRect(-20, -35, 40, 70); 
        ctx.fillStyle = '#222'; ctx.fillRect(-20, -25, 40, 20); 
        ctx.fillStyle = '#fff'; ctx.fillRect(-12, -22, 8, 8); ctx.fillRect(4, -22, 8, 8); 
        ctx.fillStyle = up.dmg > 3 ? '#0ff' : '#555'; ctx.fillRect(10, 0, 30, 10); 
        ctx.restore();
    }

    function toggleShop() {
        paused = !paused;
        document.getElementById('shop-menu').style.display = paused ? 'flex' : 'none';
        document.getElementById('b-rate').innerText = up.rP;
        document.getElementById('b-dmg').innerText = up.dP;
    }

    function buy(t) {
        if (t === 'rate' && score >= up.rP) { score -= up.rP; up.rate++; up.rP = Math.floor(up.rP * 1.8); }
        if (t === 'dmg' && score >= up.dP) { score -= up.dP; up.dmg++; up.dP = Math.floor(up.dP * 2.2); }
        if (t === 'heal' && score >= 300) { score -= 300; hp = 100; }
        toggleShop(); toggleShop();
    }

    function update() {
        if (paused) return;
        frame++;

        // Scheduled Boss Timer
        if (frame % 60 === 0) {
            seconds++;
            let timeLeft = 60 - (seconds % 60);
            document.getElementById('boss-timer').innerText = timeLeft;
            if (seconds > 0 && seconds % 60 === 0 && !boss) {
                boss = { x: w, y: groundY - 140, w: 180, h: 140, hp: 50 + (seconds), max: 50 + (seconds) };
                document.getElementById('boss-ui').style.display = 'block';
            }
        }

        dy += 1.5; py += dy; px += dx;
        if (py > groundY - 75) { py = groundY - 75; dy = 0; isJumping = false; }
        px = Math.max(0, Math.min(w - 80, px));

        // Spawn Enemies with different outfits (Only when no boss)
        if (frame % 80 === 0 && !boss) {
            const outfits = ['#2e7d32', '#1565c0', '#c62828', '#f9a825', '#6a1b9a']; 
            enemies.push({ 
                x: w, y: groundY - 60, w: 40, h: 60, 
                hp: 1 + Math.floor(seconds/120), 
                speed: 4 + Math.random()*3,
                color: outfits[Math.floor(Math.random()*outfits.length)]
            });
        }

        bullets.forEach((b, i) => {
            b.x += b.v;
            if (b.x > w || b.x < 0) bullets.splice(i, 1);
        });

        if (boss) {
            if (boss.x > w - 220) boss.x -= 1.5;
            bullets.forEach((b, bi) => {
                if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y) {
                    boss.hp -= up.dmg; bullets.splice(bi, 1);
                    document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.max*100) + "%";
                    if (boss.hp <= 0) { boss = null; score += 2500; document.getElementById('boss-ui').style.display = 'none'; }
                }
            });
        }

        enemies.forEach((en, i) => {
            en.x -= en.speed;
            bullets.forEach((b, bi) => {
                if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                    en.hp -= up.dmg; bullets.splice(bi, 1);
                    if (en.hp <= 0) { enemies.splice(i, 1); score += 100; }
                }
            });
            if (px + 40 > en.x && px < en.x + en.w && py + 60 > en.y) {
                hp -= 0.4; if (hp <= 0) location.reload();
            }
        });
        document.getElementById('score').innerText = score;
        document.getElementById('hp').innerText = Math.floor(hp);
    }

    function draw() {
        ctx.fillStyle = '#05050f'; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#111'; ctx.fillRect(0, groundY, w, h - groundY);
        drawPlayer(px, py, facing);
        bullets.forEach(b => { ctx.fillStyle = '#ff0'; ctx.fillRect(b.x, b.y, 15, 5); });
        enemies.forEach(en => {
            ctx.fillStyle = en.color; ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = '#222'; ctx.fillRect(en.x, en.y, en.w, 12); // Helmet detail
        });
        if (boss) { 
            ctx.fillStyle = '#333'; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); 
            ctx.strokeStyle = '#f00'; ctx.lineWidth = 2; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    const ctrl = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };
    ctrl('lBtn', () => { dx = -8; facing = -1; }, () => { dx = 0; });
    ctrl('rBtn', () => { dx = 8; facing = 1; }, () => { dx = 0; });
    ctrl('jumpBtn', () => { if (!isJumping) { dy = -26; isJumping = true; } });
    let lastS = 0;
    ctrl('shootBtn', () => {
        const cd = Math.max(4, 18 - (up.rate * 2));
        if (frame - lastS > cd) {
            bullets.push({ x: px + (facing === 1 ? 60 : 0), y: py + 45, v: facing * 16 });
            lastS = frame;
        }
    });
    loop();
</script>
</body>
</html>
