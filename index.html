<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung Sahur Fix</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2d5a27; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-family: 'Arial Black', sans-serif; pointer-events: none;
            text-shadow: 3px 3px 0 #000;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="main-text">TAP TO START THE SHOW</h1>
        <h2 id="sub-text">SCORE: 0 | HP: 100</h2>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mainText = document.getElementById('main-text');
    const subText = document.getElementById('sub-text');

    let w, h, groundY;
    let state = 'MENU'; // MENU, PLAY, OVER
    let frame = 0, score = 0, hp = 100, speed = 10;
    let obstacles = [], arrows = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h - 150;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        x: 100, y: 0, dy: 0, jumps: 0, spin: 0,
        update() {
            if (state === 'MENU') {
                this.y = groundY - 100; // Just sit there on menu
                return;
            }
            this.dy += 1.4;
            this.y += this.dy;
            if (this.y > groundY - 100) {
                this.y = groundY - 100;
                this.dy = 0;
                this.jumps = 0;
            }
            if (this.spin > 0) this.spin--;
        }
    };

    // --- CHARACTER DRAWING (Image Match) ---
    function drawRider(x, y) {
        ctx.save();
        if (player.spin > 0) {
            ctx.translate(x + 40, y + 50);
            ctx.rotate(frame * 0.5);
            ctx.translate(-(x + 40), -(y + 50));
        }

        // Hog
        let hG = ctx.createRadialGradient(x+30, y+50, 5, x+40, y+65, 50);
        hG.addColorStop(0, '#ff99ac'); hG.addColorStop(1, '#e63946');
        ctx.fillStyle = hG;
        ctx.beginPath(); ctx.ellipse(x+40, y+70, 55, 38, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

        // Tusks
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.moveTo(x+85, y+70); ctx.bezierCurveTo(x+115, y+40, x+120, y+50, x+95, y+85); ctx.fill(); ctx.stroke();

        // Rider (Tung Tung)
        let wG = ctx.createLinearGradient(x+20, y, x+65, y);
        wG.addColorStop(0, '#8b5e34'); wG.addColorStop(0.5, '#d2b48c'); wG.addColorStop(1, '#fff4e0');
        ctx.fillStyle = wG;
        ctx.beginPath(); ctx.roundRect(x+20, y-5, 45, 80, [25, 25, 5, 5]); ctx.fill(); ctx.stroke();

        // Staring Eyes
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.arc(x+32, y+22, 11, 0, Math.PI*2); ctx.arc(x+56, y+22, 11, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath();
        ctx.arc(x+34, y+22, 4, 0, Math.PI*2); ctx.arc(x+58, y+22, 4, 0, Math.PI*2); ctx.fill();

        // Shouting Mouth
        ctx.fillStyle = '#3d0000'; ctx.beginPath();
        ctx.ellipse(x+44, y+48, 10, 15, 0, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }

    // --- THE FIX: POINTERDOWN ---
    // Pointerdown works for BOTH touch and mouse on iPad
    window.addEventListener('pointerdown', (e) => {
        if (state === 'MENU' || state === 'OVER') {
            state = 'PLAY';
            score = 0; hp = 100; speed = 10;
            obstacles = []; arrows = [];
            mainText.innerText = "SAHUR WAR!";
        } else {
            if (player.jumps < 2) {
                player.dy = -22;
                player.jumps++;
                if (player.jumps === 2) player.spin = 20;
            }
        }
    });

    function loop() {
        frame++;
        ctx.clearRect(0, 0, w, h);

        // Sky
        let sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, '#4facfe'); sky.addColorStop(1, '#00f2fe');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

        // Ground
        ctx.fillStyle = '#2d6a4f'; ctx.fillRect(0, groundY + 10, w, h);
        ctx.fillStyle = '#444'; ctx.fillRect(0, groundY + 30, w, 150);

        if (state === 'PLAY') {
            player.update();
            subText.innerText = `SCORE: ${score} | HP: ${hp}`;

            // ARCHERS (Towers in background)
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(w - 80, groundY - 120, 50, 130);
            ctx.fillStyle = '#fff'; // Archer Head
            ctx.fillRect(w - 70, groundY - 140, 30, 30);

            // Spawn Logic
            if (frame % 60 === 0) obstacles.push({ x: w, y: groundY - 40, w: 60, h: 60 });
            if (frame % 90 === 0) arrows.push({ x: w - 80, y: groundY - 120, w: 50, h: 8 });

            // Obstacles
            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.fillStyle = '#8B4513'; ctx.fillRect(o.x, o.y, o.w, o.h);
                if (player.x + 70 > o.x && player.x < o.x + o.w && player.y + 100 > o.y) {
                    if (player.spin > 0) { obstacles.splice(i, 1); score += 5; }
                    else { hp -= 20; obstacles.splice(i, 1); }
                }
                if (o.x < -100) { obstacles.splice(i, 1); score++; speed += 0.15; }
            });

            // Arrows
            arrows.forEach((a, i) => {
                a.x -= (speed + 7);
                ctx.fillStyle = '#fff'; ctx.fillRect(a.x, a.y, a.w, a.h);
                if (player.x + 70 > a.x && player.x < a.x + a.w && player.y + 100 > a.y && player.y < a.y + 50) {
                    if (player.spin > 0) { arrows.splice(i, 1); score += 10; }
                    else { hp -= 25; arrows.splice(i, 1); }
                }
                if (a.x < -100) arrows.splice(i, 1);
            });

            if (hp <= 0) {
                state = 'OVER';
                mainText.innerText = "GAME OVER!";
                subText.innerText = "TAP TO TRY AGAIN";
            }
        }

        drawRider(player.x, player.y);
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
