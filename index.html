<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung Brainrot Pixel HD</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 30px); }
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui {
            position: absolute; top: calc(var(--safe-top) + 20px); width: 100%;
            display: flex; justify-content: space-around; color: white;
            font-size: 24px; text-shadow: 3px 3px 0 #000; pointer-events: none;
        }
        
        /* iPad Controls: High enough to see clearly */
        .controls {
            position: absolute; bottom: calc(var(--safe-bottom) + 60px);
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box;
        }
        .dir-pad { display: flex; gap: 15px; }
        .btn {
            width: 100px; height: 100px; border-radius: 20px; border: 4px solid #fff;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 18px; box-shadow: 0 8px 0 #000;
        }
        #leftBtn, #rightBtn { background: #4facfe; }
        #jumpBtn { background: #ff0066; width: 130px; height: 130px; border-radius: 50%; }
        .btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #000; }
        
        #wicki { position: absolute; top: 10px; right: 20px; color: #fff; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>

<div id="ui">
    <div>SCORE: <span id="score">0</span></div>
    <div>BY WICKI</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div class="dir-pad">
        <div class="btn" id="leftBtn">LEFT</div>
        <div class="btn" id="rightBtn">RIGHT</div>
    </div>
    <div class="btn" id="jumpBtn">JUMP</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h, frame = 0, score = 0;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 24-Bit Style Graphics
    const player = {
        x: 0, z: 0, y: 0, dy: 0, targetX: 0,
        update() {
            // Gravity & Jump
            this.dy -= 0.8;
            this.y += this.dy;
            if (this.y < 0) { this.y = 0; this.dy = 0; }
            
            // Smooth X movement
            this.x += (this.targetX - this.x) * 0.2;
            this.z += 0.1; // Auto forward
            score = Math.floor(this.z * 10);
            document.getElementById('score').innerText = score;
        },
        draw() {
            // Convert 3D to Isometric 2D
            const screenX = w/2 + (this.x) * 50;
            const screenY = h/2 + (this.y * -1.5) + 100;
            
            // Draw Tung Tung (The Log)
            ctx.save();
            ctx.translate(screenX, screenY);
            
            // Log Body
            ctx.fillStyle = '#d2b48c'; // Wood
            ctx.fillRect(-25, -70, 50, 80);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
            ctx.strokeRect(-25, -70, 50, 80);
            
            // Brainrot Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(-15, -55, 12, 12); ctx.fillRect(5, -55, 12, 12);
            ctx.fillStyle = '#000';
            ctx.fillRect(-11, -51, 4, 4); ctx.fillRect(9, -51, 4, 4);
            
            // Mouth
            ctx.fillRect(-10, -30, 20, 5);
            ctx.restore();
        }
    };

    const platforms = [];
    for(let i=0; i<10; i++) {
        platforms.push({ x: (Math.random()-0.5)*6, z: i*4, color: i%2===0?'#ff0066':'#33ff33' });
    }

    function drawPlatforms() {
        platforms.forEach(p => {
            const relZ = p.z - player.z;
            if(relZ < -5) { // Recycle platform
                p.z += 40;
                p.x = (Math.random()-0.5)*8;
            }
            
            const screenX = w/2 + (p.x - player.x) * 50;
            const screenY = h/2 + (relZ) * 80 + 150;
            const size = 100 / (1 + relZ*0.1);

            if(relZ > -2 && relZ < 15) {
                ctx.fillStyle = p.color;
                ctx.fillRect(screenX - size/2, screenY, size, 20);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
                ctx.strokeRect(screenX - size/2, screenY, size, 20);
            }
        });
    }

    // iPad Controls
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); player.targetX -= 1; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); player.targetX += 1; });
    document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if(player.y === 0) player.dy = 15; 
    });

    function loop() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0,0,w,h);
        
        // Draw Background Stars
        ctx.fillStyle = '#fff';
        for(let i=0; i<20; i++) ctx.fillRect((i*137)%w, (i*frame/10)%h, 2, 2);

        drawPlatforms();
        player.update();
        player.draw();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
