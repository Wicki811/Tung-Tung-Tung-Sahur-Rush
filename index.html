<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung Road Rush</title>
    <style>
        body { margin: 0; background: #0055ff; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { 
            background: #4facfe; 
            border: 15px solid #ffcc00; 
            border-radius: 40px; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
        .btn { 
            position: absolute; bottom: 50px; width: 100px; height: 100px; 
            border-radius: 50%; border: 5px solid #000; display: flex; 
            align-items: center; justify-content: center; color: white; 
            font-weight: bold; font-size: 18px; text-shadow: 2px 2px #000;
        }
        #jumpBtn { left: 50px; background: #8b5e34; } /* Barrel Style */
        #attackBtn { right: 50px; background: #e63946; } /* Bat Style */
        #hud { position: absolute; top: 60px; width: 80%; color: white; font-size: 20px; display: flex; justify-content: space-between; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>LIVES: <span id="lives">3</span></div>
        <div>DIST: <span id="dist">0</span>m</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="jumpBtn" class="btn">JUMP</div>
    <div id="attackBtn" class="btn">ATTACK</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const distEl = document.getElementById('dist');

    let w, h, groundY, frame = 0, score = 0, lives = 3, distance = 0, speed = 8;
    let state = 'PLAY';
    let objects = [];

    function resize() {
        w = canvas.width = window.innerWidth * 0.9;
        h = canvas.height = window.innerHeight * 0.7;
        groundY = h - 80;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        x: 80, y: 0, dy: 0, jumping: false, attacking: 0,
        update() {
            this.dy += 1.2; this.y += this.dy;
            if (this.y > groundY - 100) { this.y = groundY - 100; this.dy = 0; this.jumping = false; }
            if (this.attacking > 0) this.attacking--;
            distance += speed / 10;
            distEl.innerText = Math.floor(distance);
        },
        draw() {
            ctx.save();
            // The Pig
            ctx.fillStyle = '#ffafcc';
            ctx.fillRect(this.x, this.y + 50, 80, 50);
            ctx.fillStyle = '#000'; ctx.fillRect(this.x + 70, this.y + 65, 8, 8); // Tusk
            
            // Tung Tung
            ctx.fillStyle = '#d2b48c';
            ctx.fillRect(this.x + 20, this.y, 40, 70);
            
            // The Bat (Attack animation)
            ctx.fillStyle = '#8b4513';
            if (this.attacking > 0) {
                ctx.fillRect(this.x + 50, this.y + 20, 50, 15);
            } else {
                ctx.fillRect(this.x + 10, this.y + 40, 15, 40);
            }
            ctx.restore();
        }
    };

    function spawnObject() {
        if (frame % 80 === 0) {
            const type = Math.random() > 0.5 ? 'CRATE' : 'BALL';
            objects.push({ x: w, y: type === 'CRATE' ? groundY - 60 : groundY - 30, type, w: 60, h: 60 });
        }
    }

    function updateObjects() {
        objects.forEach((o, i) => {
            o.x -= speed;
            // Draw
            if (o.type === 'CRATE') {
                ctx.fillStyle = '#5d4037'; ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeStyle = '#fff'; ctx.strokeRect(o.x+5, o.y+5, o.w-10, o.h-10);
            } else {
                ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(o.x+15, o.y+15, 20, 0, Math.PI*2); ctx.fill();
            }

            // Collision
            let hit = player.x < o.x + o.w && player.x + 60 > o.x && player.y + 100 > o.y;
            if (hit) {
                if (player.attacking > 0) {
                    objects.splice(i, 1); score += 100; scoreEl.innerText = score;
                } else {
                    lives--; livesEl.innerText = lives; objects.splice(i, 1);
                    if (lives <= 0) location.reload();
                }
            }
            if (o.x < -100) objects.splice(i, 1);
        });
    }

    function drawBackground() {
        // Grass and Road
        ctx.fillStyle = '#87af3a'; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#555'; ctx.fillRect(0, groundY, w, 100);
        ctx.fillStyle = '#fff';
        for(let i=0; i<6; i++) ctx.fillRect((i*200 - (frame*speed)%200), groundY + 40, 60, 10);
        
        // Archer Tower (Background)
        ctx.fillStyle = '#777'; ctx.fillRect(w - 150, groundY - 150, 80, 150);
        ctx.fillStyle = '#ff0066'; ctx.fillRect(w - 130, groundY - 180, 40, 40); // Archer
    }

    document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
        e.preventDefault(); if (!player.jumping) { player.dy = -22; player.jumping = true; }
    });
    document.getElementById('attackBtn').addEventListener('touchstart', (e) => {
        e.preventDefault(); player.attacking = 20;
    });

    function loop() {
        frame++;
        drawBackground();
        player.update();
        player.draw();
        spawnObject();
        updateObjects();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
