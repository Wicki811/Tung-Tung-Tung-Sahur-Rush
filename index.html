<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung Sahur: Obby Challenge</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: 'Arial', sans-serif; }
        #hud {
            position: absolute; top: 30px; width: 100%; display: flex; 
            justify-content: center; color: white; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10;
        }
        /* Fixed iPad Controls - Floating over the safe area */
        #controls {
            position: absolute; bottom: calc(var(--safe-bottom) + 50px);
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box; z-index: 20;
        }
        .joy-stick {
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border: 4px solid #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .btn-jump {
            width: 100px; height: 100px; background: #ffcc00;
            border: 5px solid #000; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            box-shadow: 0 8px 0 #997a00; active { transform: translateY(4px); box-shadow: 0 4px 0 #997a00; }
        }
        #signature { position: absolute; top: 10px; right: 20px; color: #fff; opacity: 0.6; }
    </style>
</head>
<body>

<div id="hud">LEVEL <span id="lvl">1</span></div>
<div id="signature">by wicki</div>

<div id="controls">
    <div class="joy-stick" id="movePad">MOVE</div>
    <div class="btn-jump" id="jumpBtn">JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // 1. SCENE SETUP
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x4facfe);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. LIGHTING
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 2));

    // 3. PLAYER (The Tung Tung 3D Model)
    const playerGroup = new THREE.Group();
    // Hog
    const hog = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 1.2), new THREE.MeshStandardMaterial({ color: 0xffafcc }));
    hog.position.y = 0.25;
    playerGroup.add(hog);
    // Tung Tung Rider
    const rider = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
    rider.position.y = 0.9;
    playerGroup.add(rider);
    scene.add(playerGroup);

    // 4. OBBY LEVEL GENERATION
    let platforms = [];
    function createLevel() {
        for(let i=0; i<20; i++) {
            const geo = new THREE.BoxGeometry(2, 0.5, 2);
            const mat = new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x87af3a : 0xff0066 });
            const p = new THREE.Mesh(geo, mat);
            p.position.set(0, 0, -i * 5);
            // Add some "Brainrot" chaos - random offsets
            if(i > 3) p.position.x = (Math.random() - 0.5) * 4;
            scene.add(p);
            platforms.push(p);
        }
    }
    createLevel();

    // 5. PHYSICS & CONTROLS
    let velocityY = 0;
    let isJumping = false;
    let moveForward = false;
    const speed = 0.15;

    camera.position.set(0, 3, 5);

    function checkCollision() {
        let onGround = false;
        platforms.forEach(p => {
            if (Math.abs(playerGroup.position.x - p.position.x) < 1.2 &&
                Math.abs(playerGroup.position.z - p.position.z) < 1.2 &&
                playerGroup.position.y >= p.position.y + 0.2 &&
                playerGroup.position.y <= p.position.y + 0.6) {
                onGround = true;
                playerGroup.position.y = p.position.y + 0.5;
            }
        });
        return onGround;
    }

    // Input Handling
    document.getElementById('jumpBtn').addEventListener('touchstart', () => {
        if(!isJumping) { velocityY = 0.2; isJumping = true; }
    });
    
    let touchX = 0;
    document.getElementById('movePad').addEventListener('touchstart', () => moveForward = true);
    document.getElementById('movePad').addEventListener('touchend', () => moveForward = false);

    // 6. GAME LOOP
    function animate() {
        requestAnimationFrame(animate);

        // Gravity
        velocityY -= 0.01;
        playerGroup.position.y += velocityY;

        if (checkCollision() && velocityY <= 0) {
            velocityY = 0;
            isJumping = false;
        }

        // Movement
        if (moveForward) {
            playerGroup.position.z -= speed;
        }

        // Camera Follow
        camera.position.lerp(new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 3, playerGroup.position.z + 6), 0.1);
        camera.lookAt(playerGroup.position);

        // Fall off
        if (playerGroup.position.y < -5) {
            playerGroup.position.set(0, 2, 0);
            velocityY = 0;
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
