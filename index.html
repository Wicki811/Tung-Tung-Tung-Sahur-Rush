<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tung Tung Sahur Pro</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a2a0a; touch-action: none; -webkit-user-select: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: auto; }
        #instruction {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="instruction">TAP ANYWHERE TO JUMP / DOUBLE TAP TO SPIN</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let w, h, groundY;
    let state = 'MENU'; // States: MENU, PLAYING, GAMEOVER
    let score = 0;
    let hp = 100;
    let speed = 10;
    let frame = 0;
    let obstacles = [];
    let arrows = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        groundY = h - 150;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- CHARACTER DRAWING (SAME AS IMAGE) ---
    function drawTungTung(x, y, isSpinning) {
        ctx.save();
        if (isSpinning) {
            ctx.translate(x + 40, y + 50);
            ctx.rotate(frame * 0.4);
            ctx.translate(-(x + 40), -(y + 50));
        }

        // The Hog
        let hG = ctx.createRadialGradient(x+30, y+50, 5, x+40, y+65, 50);
        hG.addColorStop(0, '#ff99ac'); hG.addColorStop(1, '#e63946');
        ctx.fillStyle = hG;
        ctx.beginPath(); ctx.ellipse(x+40, y+70, 55, 38, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

        // Tusks
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.moveTo(x+85, y+70); ctx.bezierCurveTo(x+115, y+40, x+120, y+50, x+95, y+85); ctx.fill(); ctx.stroke();

        // The Rider (Cylinder)
        let wG = ctx.createLinearGradient(x+20, y, x+65, y);
        wG.addColorStop(0, '#8b5e34'); wG.addColorStop(0.5, '#d2b48c'); wG.addColorStop(1, '#fff4e0');
        ctx.fillStyle = wG;
        ctx.beginPath(); ctx.roundRect(x+20, y-5, 45, 80, [25, 25, 5, 5]); ctx.fill(); ctx.stroke();

        // Staring Eyes
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.arc(x+32, y+22, 11, 0, Math.PI*2); ctx.arc(x+56, y+22, 11, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath();
        ctx.arc(x+34, y+22, 4, 0, Math.PI*2); ctx.arc(x+58, y+22, 4, 0, Math.PI*2); ctx.fill();

        // The Bat
        ctx.save(); ctx.translate(x+65, y+55); ctx.rotate(-Math.PI/4);
        ctx.fillStyle = '#5d4037'; ctx.fillRect(0, -60, 15, 75); ctx.strokeRect(0, -60, 15, 75);
        ctx.restore();

        ctx.restore();
    }

    const player = {
        x: 100, y: 0, dy: 0, jumps: 0, spinTime: 0,
        update() {
            if (state !== 'PLAYING') return;
            this.dy += 1.4;
            this.y += this.dy;
            if (this.y > groundY - 100) {
                this.y = groundY - 100;
                this.dy = 0;
                this.jumps = 0;
            }
            if (this.spinTime > 0) this.spinTime--;
        }
    };

    // --- GAME CONTROL ---
    function handleAction(e) {
        if (e) e.preventDefault();
        
        if (state === 'MENU' || state === 'GAMEOVER') {
            // Reset and Start
            state = 'PLAYING';
            score = 0;
            hp = 100;
            speed = 10;
            obstacles = [];
            arrows = [];
            player.y = groundY - 100;
        } else if (state === 'PLAYING') {
            if (player.jumps < 2) {
                player.dy = -22;
                player.jumps++;
                if (player.jumps === 2) player.spinTime = 20;
            }
        }
    }

    // Universal listeners for iPad
    window.addEventListener('touchstart', handleAction, { passive: false });
    window.addEventListener('mousedown', handleAction);

    function loop() {
        frame++;
        ctx.clearRect(0, 0, w, h);

        // Sky
        let sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, '#4facfe'); sky.addColorStop(1, '#00f2fe');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

        // Ground
        ctx.fillStyle = '#2d6a4f'; ctx.fillRect(0, groundY + 10, w, h);
        ctx.fillStyle = '#444'; ctx.fillRect(0, groundY + 30, w, 120);

        if (state === 'MENU') {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 50px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('TUNG TUNG SAHUR', w/2, h/2 - 20);
            ctx.font = '25px sans-serif';
            ctx.fillText('TAP ANYWHERE TO START', w/2, h/2 + 40);
        }

        if (state === 'PLAYING') {
            player.update();

            // Spawn Archers (Visual only background)
            ctx.fillStyle = '#333';
            ctx.fillRect(w - 60, groundY - 100, 40, 100); // Archer Tower

            // Spawn Obstacles (Boxes)
            if (frame % 70 === 0) obstacles.push({ x: w, y: groundY - 40, w: 60, h: 60 });
            
            // Spawn Arrows (From the archer)
            if (frame % 100 === 0) arrows.push({ x: w - 60, y: groundY - 120, w: 40, h: 6 });

            // Handle Boxes
            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.fillStyle = '#5d4037'; ctx.fillRect(o.x, o.y, o.w, o.h);
                if (player.x + 70 > o.x && player.x < o.x + o.w && player.y + 100 > o.y) {
                    if (player.spinTime > 0) { obstacles.splice(i, 1); score += 5; } 
                    else { hp -= 20; obstacles.splice(i, 1); }
                }
                if (o.x < -100) { obstacles.splice(i, 1); score++; speed += 0.1; }
            });

            // Handle Arrows
            arrows.forEach((a, i) => {
                a.x -= (speed + 6);
                ctx.fillStyle = '#fff'; ctx.fillRect(a.x, a.y, a.w, a.h);
                if (player.x + 70 > a.x && player.x < a.x + a.w && player.y + 100 > a.y && player.y < a.y + 40) {
                    if (player.spinTime > 0) { arrows.splice(i, 1); score += 10; }
                    else { hp -= 25; arrows.splice(i, 1); }
                }
                if (a.x < -100) arrows.splice(i, 1);
            });

            // HUD
            ctx.fillStyle = '#000'; ctx.fillRect(20, 20, 200, 20);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(20, 20, hp * 2, 20);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('SCORE: ' + score, 20, 80);

            if (hp <= 0) state = 'GAMEOVER';
        }

        if (state === 'GAMEOVER') {
            ctx.fillStyle = 'rgba(255,0,0,0.4)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.font = 'bold 60px sans-serif';
            ctx.fillText('WASTED', w/2, h/2);
            ctx.font = '25px sans-serif';
            ctx.fillText('TAP TO RETRY', w/2, h/2 + 60);
        }

        drawTungTung(player.x, player.y, player.spinTime > 0);
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
