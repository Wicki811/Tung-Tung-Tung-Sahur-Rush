<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tung Tung Sahur 3D</title>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 30px); }
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; }
        
        /* High-Visibility UI */
        #ui {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: #fff; font-family: 'Arial Black', sans-serif; font-size: 32px;
            text-shadow: 4px 4px 0px #000, 0 0 20px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* iPad Control Fix: Huge buttons, high placement */
        .controls {
            position: absolute; bottom: calc(var(--safe-bottom) + 80px);
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 50px; box-sizing: border-box; z-index: 100;
        }
        .dir-controls { display: flex; gap: 25px; }
        .btn {
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); border: 4px solid #fff; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-jump { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: linear-gradient(145deg, #ff0066, #ff85a1); border-color: #fff; 
        }
        .btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.5); }

        #wicki { position: absolute; bottom: 15px; right: 20px; color: #fff; opacity: 0.6; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="score">0</span></div>
<div id="wicki">by wicki</div>

<div class="controls">
    <div class="dir-controls">
        <div class="btn" id="lBtn">LEFT</div>
        <div class="btn" id="rBtn">RIGHT</div>
    </div>
    <div class="btn btn-jump" id="jBtn">JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 3D SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Sky(); // Beautiful sky gradient
    scene.background = new THREE.Color(0x4facfe);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Light
    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 15, 5);
    sun.castShadow = true;
    scene.add(sun);

    // --- HIGH QUALITY TUNG TUNG CHARACTER ---
    const character = new THREE.Group();
    
    // Body (The Log) with better texture look
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.4, 1.4, 16),
        new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.8 })
    );
    character.add(body);

    // Eyes (Detailed)
    const eyeWhite = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    const eyeBlack = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.11), new THREE.MeshBasicMaterial({ color: 0x000000 }));
    
    const eyeL = eyeWhite.clone(); eyeL.position.set(-0.15, 0.4, 0.35);
    const pupilL = eyeBlack.clone(); pupilL.position.set(-0.15, 0.4, 0.36);
    const eyeR = eyeWhite.clone(); eyeR.position.set(0.15, 0.4, 0.35);
    const pupilR = eyeBlack.clone(); pupilR.position.set(0.15, 0.4, 0.36);
    
    character.add(eyeL, pupilL, eyeR, pupilR);
    character.position.y = 2;
    scene.add(character);

    // --- ENDLESS OBBY LEVEL ---
    const platforms = [];
    const colors = [0x33ff33, 0xff0066, 0x00d2ff, 0xffcc00];
    
    function createPlatform(z) {
        const p = new THREE.Mesh(
            new THREE.BoxGeometry(3.5, 0.6, 4),
            new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
        );
        p.position.set((Math.random()-0.5)*7, 0, z);
        p.receiveShadow = true;
        scene.add(p);
        platforms.push(p);
    }

    for(let i=0; i<15; i++) createPlatform(-i * 8);

    // --- CONTROLS & PHYSICS ---
    let velY = 0, dist = 0, speed = 0.15;
    let jumping = false, moveL = false, moveR = false;

    // iPad Touch Handlers
    const handle = (id, start, end) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
    };

    handle('lBtn', () => moveL = true, () => moveL = false);
    handle('rBtn', () => moveR = true, () => moveR = false);
    handle('jBtn', () => { if(!jumping) { velY = 0.25; jumping = true; } }, () => {});

    function checkCollision() {
        let grounded = false;
        platforms.forEach(p => {
            if (Math.abs(character.position.x - p.position.x) < 2.0 &&
                Math.abs(character.position.z - p.position.z) < 2.5 &&
                character.position.y >= p.position.y + 0.6 &&
                character.position.y <= p.position.y + 1.1) {
                grounded = true;
                character.position.y = p.position.y + 0.7;
            }
        });
        return grounded;
    }

    // --- GAME LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Movement Physics
        velY -= 0.01; // Gravity
        character.position.y += velY;

        if (checkCollision() && velY <= 0) {
            velY = 0; jumping = false;
        }

        if(moveL) character.position.x -= 0.15;
        if(moveR) character.position.x += 0.15;

        // Auto-Forward
        character.position.z -= speed;
        dist += speed;
        document.getElementById('score').innerText = Math.floor(dist);

        // Endless recycling
        if(platforms[0].position.z > character.position.z + 10) {
            const p = platforms.shift();
            p.position.z = platforms[platforms.length-1].position.z - 8;
            p.position.x = (Math.random()-0.5)*7;
            platforms.push(p);
            speed += 0.0005; // Gets faster!
        }

        // Smooth Camera Follow
        camera.position.lerp(new THREE.Vector3(character.position.x, character.position.y + 4, character.position.z + 8), 0.1);
        camera.lookAt(character.position);

        // Fall Check
        if(character.position.y < -10) {
            character.position.set(0, 5, platforms[0].position.z);
            velY = 0;
            speed = 0.15;
        }

        renderer.render(scene, camera);
    }
    animate();

    // Responsive Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
